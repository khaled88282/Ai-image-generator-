<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 24px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        #status { text-align: center; margin: 15px 0; color: #666; font-size: 14px; min-height: 20px; }
        #result { text-align: center; }
        #result img { max-width: 100%; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .download-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎨 AI Image Generator</h1>
        <input type="text" id="prompt" placeholder="Describe your image..." autocomplete="off">
        <select id="ratio">
            <option value="1:1">Square (1:1)</option>
            <option value="4:3">Landscape (4:3)</option>
            <option value="3:4">Portrait (3:4)</option>
            <option value="16:9">Wide (16:9)</option>
            <option value="9:16">Story (9:16)</option>
        </select>
        <button onclick="generate()">🚀 Generate</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const ratio = document.getElementById('ratio').value;
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const btn = document.querySelector('button');
            
            if(!prompt.trim()) { status.innerHTML = '⚠️ Please enter a prompt'; return; }
            
            btn.disabled = true;
            status.innerHTML = '⏳ Connecting to AI engine...';
            result.innerHTML = '';

            try {
                // Step 1: Get signature
                const signer = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://prompt-signer.freegen.app/'), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: '{}'
                });
                const {ts, sig} = await signer.json();
                
                status.innerHTML = '⏳ Generating image...';

                // Step 2: Submit generation
                const gen = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://image-generator.freegen.app/'), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt, ratio_id: ratio, ts, sig})
                });
                const {job_id} = await gen.json();

                status.innerHTML = '⏳ Processing (5-10 seconds)...';

                // Step 3: WebSocket
                const ws = new WebSocket('wss://websocket-bridge.freegen.app/ws');
                
                ws.onopen = async () => {
                    const enc = new TextEncoder();
                    const hashBuffer = await crypto.subtle.digest('SHA-256', enc.encode(String(ts) + job_id + sig));
                    const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
                    ws.send(JSON.stringify({job_id, ts, hash: hashHex}));
                };

                ws.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if(data.type === 'result') {
                            result.innerHTML = `<img src="${data.url}" alt="Generated Image">
                                <br><a class="download-btn" href="${data.url}" download>📥 Download</a>`;
                            status.innerHTML = '✅ Success!';
                            ws.close();
                        } else if(data.message) {
                            status.innerHTML = '⏳ ' + data.message;
                        }
                    } catch(err) {}
                };

                ws.onerror = () => {
                    // Fallback: try direct websocket without auth fallback
                    status.innerHTML = '❌ Connection issue. Retrying...';
                };
            } catch(e) {
                result.innerHTML = `<div style="color:#ef4444;padding:15px;background:#fef2f2;border-radius:10px">
                    ❌ Error: ${e.message}<br><small>Check console for details</small></div>`;
                status.innerHTML = '';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
